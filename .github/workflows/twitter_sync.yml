name: Sync Website to Twitter (X)

on:
  schedule:
    - cron: '0 * * * *' # يفحص رأس كل ساعة تلقائياً لالتقاط المقالات الجديدة فوراً
  workflow_dispatch: # يتيح لك التشغيل اليدوي بضغطة زر من تبويب Actions

jobs:
  tweet-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true # يضمن الاحتفاظ بصلاحيات الكتابة لتحديث ملف الذاكرة

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests feedparser

    - name: Run Twitter Sync Script via Buffer
      env:
        BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
        BUFFER_PROFILE_ID: ${{ secrets.BUFFER_PROFILE_ID }}
      run: python fetch_and_tweet.py

    - name: Commit and Push Twitter History File
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # التحقق من وجود ملف ذاكرة التغريدات وحفظه داخل المستودع تلقائياً
        if [ -f published_tweets.txt ]; then
          git add published_tweets.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Twitter history log via Buffer [skip ci]" && git push origin HEAD:${{ github.ref_name }})
        fi
